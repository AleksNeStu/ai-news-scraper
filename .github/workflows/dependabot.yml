name: Dependabot auto-merge

on:
  pull_request:
    branches: [dev]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - uses: github-actions-ecosystem/action-merge-dependabot@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          merge-method: squash