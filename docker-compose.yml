# =====================================================
# AI News Scraper — docker compose for local dev
# =====================================================

services:
  db:
    image: postgres:16-alpine
    container_name: ai-news-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_news
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-news-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  chromadb:
    image: chromadb/chroma:latest
    container_name: ai-news-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chromadata:/chroma/chroma

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ai-news-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      chromadb:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/ai_news
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8082:8082"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ai-news-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_INTERNAL_URL: http://api:8082
      NEXT_PUBLIC_API_URL: http://localhost:8082
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages

volumes:
  pgdata:
  redisdata:
  chromadata: